<?xml version="1.0" encoding="UTF-8"?>
<!-- Dad Strength — Horizontal Lockup — Dark -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 400" width="1400" height="400">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Space+Grotesk:wght@300;400;600&amp;display=swap');</style>
    <linearGradient id="hd_ringGrad" x1="300" y1="300" x2="1700" y2="1700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4f6f8"/><stop offset="12%" stop-color="#bcc3c9"/>
      <stop offset="26%" stop-color="#59626b"/><stop offset="39%" stop-color="#e8ecef"/>
      <stop offset="56%" stop-color="#5d6670"/><stop offset="73%" stop-color="#c2c9cf"/>
      <stop offset="88%" stop-color="#3f474f"/><stop offset="100%" stop-color="#d7dde1"/>
    </linearGradient>
    <linearGradient id="hd_steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7dbe0"/><stop offset="20%" stop-color="#8e969f"/>
      <stop offset="50%" stop-color="#5d6670"/><stop offset="80%" stop-color="#b8bfc7"/>
      <stop offset="100%" stop-color="#717a84"/>
    </linearGradient>
    <radialGradient id="hd_face" cx="45%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#22272d"/><stop offset="45%" stop-color="#15191e"/>
      <stop offset="100%" stop-color="#0d1014"/>
    </radialGradient>
    <linearGradient id="hd_letter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8dde2"/><stop offset="15%" stop-color="#a9b0b7"/>
      <stop offset="40%" stop-color="#6f7780"/><stop offset="70%" stop-color="#b4bbc2"/>
      <stop offset="100%" stop-color="#7a838c"/>
    </linearGradient>
    <linearGradient id="hd_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1d088"/><stop offset="25%" stop-color="#c79228"/>
      <stop offset="50%" stop-color="#8d6218"/><stop offset="75%" stop-color="#d9ac46"/>
      <stop offset="100%" stop-color="#7e5913"/>
    </linearGradient>
    <filter id="hd_shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <filter id="hd_soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="hd_clip"><circle cx="1000" cy="1000" r="695"/></clipPath>
  </defs>
  <!-- Background -->
  <rect width="1400" height="400" fill="#0D0F14"/>
  <!-- Amber top hairline -->
  <rect x="0" y="0" width="1400" height="2" fill="#C8820A" opacity="0.7"/>
  <!-- Badge -->
  <svg x="20" y="20" width="360" height="360" viewBox="220 220 1560 1560">
    <g filter="url(#hd_shadow)">
      <circle cx="1000" cy="1000" r="705" fill="none" stroke="url(#hd_ringGrad)" stroke-width="44"/>
      <circle cx="1000" cy="1000" r="705" fill="none" stroke="#f2f4f7" stroke-opacity="0.55" stroke-width="4"/>
      <circle cx="1000" cy="1000" r="683" fill="none" stroke="#222831" stroke-width="10"/>
    </g>
    <g clip-path="url(#hd_clip)">
      <circle cx="1000" cy="1000" r="695" fill="url(#hd_face)"/>
      <ellipse cx="890" cy="720" rx="430" ry="300" fill="#3a414a" opacity="0.10"/>
      <ellipse cx="1190" cy="1320" rx="520" ry="410" fill="#000" opacity="0.25"/>
    </g>
    <g filter="url(#hd_soft)">
      <rect x="970" y="350" width="60" height="1300" rx="16" fill="url(#hd_steel)" stroke="#d5dbe0" stroke-opacity="0.4" stroke-width="3"/>
      <rect x="993" y="350" width="14" height="1300" rx="7" fill="url(#hd_gold)"/>
    </g>
    <g filter="url(#hd_shadow)">
      <circle cx="1000" cy="1000" r="126" fill="url(#hd_steel)" stroke="#d7dde1" stroke-opacity="0.45" stroke-width="4"/>
      <circle cx="1000" cy="1000" r="92" fill="#0c1014"/>
    </g>
    <g filter="url(#hd_soft)">
      <path fill="url(#hd_letter)" stroke="#d5dbe0" stroke-opacity="0.45" stroke-width="3" fill-rule="evenodd"
        d="M585 745 L785 745 C866 745,907 787,907 870 L907 1130 C907 1213,866 1255,785 1255 L585 1255 Z M660 815 L779 815 C820 815,837 833,837 874 L837 1126 C837 1167,820 1185,779 1185 L660 1185 Z"/>
    </g>
    <g filter="url(#hd_soft)">
      <path fill="url(#hd_letter)" stroke="#d5dbe0" stroke-opacity="0.45" stroke-width="3"
        d="M1115 760 L1372 760 L1372 838 L1218 838 C1188 838,1175 851,1175 882 L1175 903 C1175 934,1188 947,1218 947 L1328 947 C1392 947,1430 984,1430 1045 L1430 1157 C1430 1218,1392 1255,1328 1255 L1115 1255 L1115 1177 L1295 1177 C1332 1177,1352 1159,1352 1126 L1352 1074 C1352 1040,1332 1022,1295 1022 L1205 1022 C1140 1022,1100 985,1100 922 L1100 862 C1100 799,1148 760,1215 760 Z"/>
    </g>
    <path d="M470 830 A700 700 0 0 1 820 420" fill="none" stroke="#fff" stroke-opacity="0.12" stroke-width="18" stroke-linecap="round"/>
    <circle cx="1000" cy="1000" r="705" fill="none" stroke="#000" stroke-opacity="0.35" stroke-width="12"/>
  </svg>
  <!-- Amber vertical separator -->
  <rect x="420" y="70" width="2" height="260" fill="#C8820A" opacity="0.7"/>
  <!-- Wordmark -->
  <text x="454" y="222"
    font-family="'Bebas Neue','Arial Black',Impact,sans-serif"
    font-size="130" letter-spacing="8" fill="#C0CCD8">DAD STRENGTH</text>
  <!-- Tagline -->
  <text x="456" y="278"
    font-family="'Space Grotesk',system-ui,sans-serif"
    font-size="28" font-weight="300" letter-spacing="6" fill="#6A82A0">THE OS FOR MODERN FATHERHOOD</text>
</svg>
