<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="2000" viewBox="0 0 2000 2000">
  <defs>
    <linearGradient id="ringGrad" x1="300" y1="300" x2="1700" y2="1700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4f6f8"/>
      <stop offset="12%" stop-color="#bcc3c9"/>
      <stop offset="26%" stop-color="#59626b"/>
      <stop offset="39%" stop-color="#e8ecef"/>
      <stop offset="56%" stop-color="#5d6670"/>
      <stop offset="73%" stop-color="#c2c9cf"/>
      <stop offset="88%" stop-color="#3f474f"/>
      <stop offset="100%" stop-color="#d7dde1"/>
    </linearGradient>
    <linearGradient id="innerSteel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7dbe0"/>
      <stop offset="20%" stop-color="#8e969f"/>
      <stop offset="50%" stop-color="#5d6670"/>
      <stop offset="80%" stop-color="#b8bfc7"/>
      <stop offset="100%" stop-color="#717a84"/>
    </linearGradient>
    <radialGradient id="faceGrad" cx="45%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#22272d"/>
      <stop offset="45%" stop-color="#15191e"/>
      <stop offset="100%" stop-color="#0d1014"/>
    </radialGradient>
    <linearGradient id="letterGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8dde2"/>
      <stop offset="15%" stop-color="#a9b0b7"/>
      <stop offset="40%" stop-color="#6f7780"/>
      <stop offset="70%" stop-color="#b4bbc2"/>
      <stop offset="100%" stop-color="#7a838c"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1d088"/>
      <stop offset="25%" stop-color="#c79228"/>
      <stop offset="50%" stop-color="#8d6218"/>
      <stop offset="75%" stop-color="#d9ac46"/>
      <stop offset="100%" stop-color="#7e5913"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="8" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feComponentTransfer in="mono" result="grainAlpha">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grainAlpha" mode="screen"/>
    </filter>
    <clipPath id="faceClip"><circle cx="1000" cy="1000" r="695"/></clipPath>
  </defs>

  <!-- dark brand background -->
  <rect width="2000" height="2000" fill="#141414"/>

  <g filter="url(#shadow)">
    <circle cx="1000" cy="1000" r="705" fill="none" stroke="url(#ringGrad)" stroke-width="44"/>
    <circle cx="1000" cy="1000" r="705" fill="none" stroke="#f2f4f7" stroke-opacity="0.55" stroke-width="4"/>
    <circle cx="1000" cy="1000" r="683" fill="none" stroke="#222831" stroke-width="10"/>
  </g>

  <g clip-path="url(#faceClip)">
    <circle cx="1000" cy="1000" r="695" fill="url(#faceGrad)"/>
    <rect x="305" y="305" width="1390" height="1390" fill="#11151a" opacity="0.18" filter="url(#grain)"/>
    <ellipse cx="890" cy="720" rx="430" ry="300" fill="#3a414a" opacity="0.10"/>
    <ellipse cx="1190" cy="1320" rx="520" ry="410" fill="#000000" opacity="0.25"/>
    <path d="M1000 305 L1000 1695" stroke="#080a0d" stroke-width="10" opacity="0.8"/>
  </g>

  <!-- center divider -->
  <g filter="url(#softShadow)">
    <rect x="970" y="350" width="60" height="1300" rx="16" fill="url(#innerSteel)" stroke="#d5dbe0" stroke-opacity="0.4" stroke-width="3"/>
    <rect x="993" y="350" width="14" height="1300" rx="7" fill="url(#goldGrad)"/>
    <path d="M970 350 L1030 350" stroke="#eef2f5" stroke-opacity="0.35" stroke-width="2"/>
  </g>

  <!-- central hub -->
  <g filter="url(#shadow)">
    <circle cx="1000" cy="1000" r="126" fill="url(#innerSteel)" stroke="#d7dde1" stroke-opacity="0.45" stroke-width="4"/>
    <circle cx="1000" cy="1000" r="92" fill="#0c1014"/>
    <circle cx="1000" cy="1000" r="92" fill="none" stroke="#232830" stroke-width="3"/>
  </g>

  <!-- D -->
  <g filter="url(#softShadow)">
    <path fill="url(#letterGrad)" stroke="#d5dbe0" stroke-opacity="0.45" stroke-width="3" fill-rule="evenodd"
      d="
      M 585 745
      L 785 745
      C 866 745, 907 787, 907 870
      L 907 1130
      C 907 1213, 866 1255, 785 1255
      L 585 1255
      Z

      M 660 815
      L 779 815
      C 820 815, 837 833, 837 874
      L 837 1126
      C 837 1167, 820 1185, 779 1185
      L 660 1185
      Z" />
    <path d="M585 745 L785 745 C866 745, 907 787, 907 870 L907 1130 C907 1213, 866 1255, 785 1255 L585 1255 Z"
      fill="none" stroke="#49515a" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- S -->
  <g filter="url(#softShadow)">
    <path fill="url(#letterGrad)" stroke="#d5dbe0" stroke-opacity="0.45" stroke-width="3"
      d="
      M 1115 760
      L 1372 760
      L 1372 838
      L 1218 838
      C 1188 838, 1175 851, 1175 882
      L 1175 903
      C 1175 934, 1188 947, 1218 947
      L 1328 947
      C 1392 947, 1430 984, 1430 1045
      L 1430 1157
      C 1430 1218, 1392 1255, 1328 1255
      L 1115 1255
      L 1115 1177
      L 1295 1177
      C 1332 1177, 1352 1159, 1352 1126
      L 1352 1074
      C 1352 1040, 1332 1022, 1295 1022
      L 1205 1022
      C 1140 1022, 1100 985, 1100 922
      L 1100 862
      C 1100 799, 1148 760, 1215 760
      Z"/>
  </g>

  <!-- highlights -->
  <path d="M470 830 A700 700 0 0 1 820 420" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="18" stroke-linecap="round"/>
  <path d="M1180 1580 A700 700 0 0 0 1525 1170" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="14" stroke-linecap="round"/>
  <circle cx="1000" cy="1000" r="705" fill="none" stroke="#000000" stroke-opacity="0.35" stroke-width="12"/>

  <!-- DAD STRENGTH wordmark -->
  <text x="1000" y="1820" font-family="'Arial Black', 'Impact', sans-serif" font-size="120" font-weight="900"
    letter-spacing="28" text-anchor="middle" fill="#F5F5F0" opacity="0.9">DAD STRENGTH</text>
</svg>
